<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AeroDetect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Shared CSS Variables */
        :root {
            --bg-main: linear-gradient(135deg, #f0f4ff 0%, #e0e7ff 50%, #f8fafc 100%);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: rgba(255,255,255,0.85);
            --glass-bg: rgba(255,255,255,0.15);
            --primary: #1e40af;
            --secondary: #3b82f6;
            --accent: #f59e0b;
            --shadow-light: rgba(99, 102, 241, 0.15);
            --shadow-heavy: rgba(59, 130, 246, 0.25);
            --input-bg: rgba(255, 255, 255, 0.5);
        }

        body.dark-mode {
            --bg-main: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --card-bg: rgba(26, 32, 44, 0.75);
            --glass-bg: rgba(15, 23, 42, 0.4);
            --primary: #60a5fa;
            --secondary: #93c5fd;
            --accent: #fbbf24;
            --shadow-light: rgba(99, 102, 241, 0.3);
            --shadow-heavy: rgba(59, 130, 246, 0.4);
            --input-bg: rgba(15, 23, 42, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Nav Elements */
        .top-nav {
            position: absolute;
            top: 2rem;
            width: 100%;
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .back-btn {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            color: var(--secondary);
            transform: translateX(-5px);
        }

        /* Theme Toggle */
        #theme-toggle {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 2px solid var(--secondary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--secondary);
            transition: all 0.6s ease;
            position: relative;
            overflow: hidden;
        }

        #theme-toggle::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%; width: 0; height: 0;
            background: var(--secondary);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.4s ease;
            z-index: -1;
        }

        #theme-toggle:hover::before { width: 120%; height: 120%; }
        #theme-toggle:hover { color: #fff; transform: rotate(180deg) scale(1.1); box-shadow: 0 0 20px var(--shadow-heavy); }

        /* Particles */
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .particle { position: absolute; border-radius: 50%; background: linear-gradient(45deg, var(--secondary), var(--accent)); animation: float 15s infinite linear; }
        @keyframes float { 0% { transform: translateY(100vh) translateX(0) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-100px) translateX(100px) rotate(360deg); opacity: 0; } }

        /* Auth Container */
        .auth-container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 40px 120px var(--shadow-heavy);
            z-index: 5;
            position: relative;
            animation: slideUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header .logo {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* Forms */
        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            transition: all 0.4s ease;
        }

        .input-group { position: relative; }

        .input-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        .input-group input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: var(--input-bg);
            border: 2px solid transparent;
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--secondary);
            background: var(--glass-bg);
            box-shadow: 0 0 15px var(--shadow-light);
        }

        .input-group input:focus + i { color: var(--secondary); }

        .auth-btn {
            background: linear-gradient(45deg, var(--secondary), var(--accent));
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px var(--shadow-light);
            margin-top: 0.5rem;
        }

        .auth-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px var(--shadow-heavy);
        }

        .forgot-pass {
            text-align: right;
            font-size: 0.85rem;
            color: var(--secondary);
            text-decoration: none;
            font-weight: 600;
            margin-top: -0.5rem;
        }

        .forgot-pass:hover { text-decoration: underline; }

        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .register-link a {
            color: var(--secondary);
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="top-nav">
        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
        <button id="theme-toggle" title="Toggle Theme">
            <i class="fas fa-moon"></i>
        </button>
    </div>

    <div class="auth-container">
        <div class="auth-header">
            <div class="logo">
                <i class="fas fa-satellite"></i> Aero<span>Detect</span>
            </div>
            <p>Welcome back! Sign in to your account</p>
        </div>

        <form id="login-form">
            <div class="input-group">
                <input type="email" placeholder="Email Address" required>
                <i class="fas fa-envelope"></i>
            </div>
            <div class="input-group">
                <input type="password" placeholder="Password" required>
                <i class="fas fa-lock"></i>
            </div>
            <a href="#" class="forgot-pass">Forgot Password?</a>
            <button type="submit" class="auth-btn">Sign In</button>
        </form>

        <div class="register-link">
            Don't have an account? <a href="/register">Register here</a>
        </div>
    </div>

    <script>
        // Theme Logic
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        const savedTheme = localStorage.getItem('theme') || 'light';
        
        if (savedTheme === 'dark') {
            body.classList.add('dark-mode');
            themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            themeToggle.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        // Form submission
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = e.target.querySelector('input[type="email"]').value;
            alert(`Logging in with: ${email}`);
        });

        // Background Particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 15 + 10) + 's';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.width = particle.style.height = (Math.random() * 6 + 2) + 'px';
                particle.style.opacity = Math.random() * 0.6 + 0.3;
                container.appendChild(particle);
            }
        }
        createParticles();
    </script>
</body>
</html>
