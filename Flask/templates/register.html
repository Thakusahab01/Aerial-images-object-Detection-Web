<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | AeroDetect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-main: linear-gradient(135deg, #f0f4ff 0%, #e0e7ff 50%, #f8fafc 100%);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: rgba(255,255,255,0.85);
            --glass-bg: rgba(255,255,255,0.15);
            --primary: #1e40af;
            --secondary: #3b82f6;
            --accent: #f59e0b;
            --shadow-light: rgba(99, 102, 241, 0.15);
            --shadow-heavy: rgba(59, 130, 246, 0.25);
            --input-bg: rgba(255, 255, 255, 0.5);
        }

        body.dark-mode {
            --bg-main: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --card-bg: rgba(26, 32, 44, 0.75);
            --glass-bg: rgba(15, 23, 42, 0.4);
            --primary: #60a5fa;
            --secondary: #93c5fd;
            --accent: #fbbf24;
            --shadow-light: rgba(99, 102, 241, 0.3);
            --shadow-heavy: rgba(59, 130, 246, 0.4);
            --input-bg: rgba(15, 23, 42, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .top-nav {
            position: absolute;
            top: 2rem;
            width: 100%;
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .back-btn {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            color: var(--secondary);
            transform: translateX(-5px);
        }

        #theme-toggle {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 2px solid var(--secondary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--secondary);
            transition: all 0.6s ease;
            position: relative;
            overflow: hidden;
        }

        #theme-toggle::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%; width: 0; height: 0;
            background: var(--secondary);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.4s ease;
            z-index: -1;
        }

        #theme-toggle:hover::before { width: 120%; height: 120%; }
        #theme-toggle:hover { color: #fff; transform: rotate(180deg) scale(1.1); box-shadow: 0 0 20px var(--shadow-heavy); }

        .particles { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
            z-index: 1; 
        }
        
        .particle { 
            position: absolute; 
            border-radius: 50%; 
            background: linear-gradient(45deg, var(--secondary), var(--accent)); 
            animation: float 15s infinite linear; 
        }
        
        @keyframes float { 
            0% { transform: translateY(100vh) translateX(0) rotate(0deg); opacity: 0; } 
            10% { opacity: 1; } 
            90% { opacity: 1; } 
            100% { transform: translateY(-100px) translateX(100px) rotate(360deg); opacity: 0; } 
        }

        .auth-container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 40px 120px var(--shadow-heavy);
            z-index: 5;
            position: relative;
            animation: slideUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header .logo {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            transition: all 0.4s ease;
        }

        .input-group { 
            position: relative; 
            margin-bottom: 0.5rem;
        }

        .input-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            transition: color 0.3s ease;
        }

        .input-group input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: var(--input-bg);
            border: 2px solid transparent;
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: var(--secondary);
            background: var(--glass-bg);
            box-shadow: 0 0 15px var(--shadow-light);
        }

        .input-group input:focus + i { 
            color: var(--secondary); 
        }

        .password-strength {
            height: 4px;
            border-radius: 2px;
            background: rgba(0,0,0,0.1);
            margin-top: 0.5rem;
            transition: all 0.3s ease;
        }

        .strength-weak { background: #ef4444; width: 25%; }
        .strength-fair { background: #f59e0b; width: 50%; }
        .strength-good { background: #10b981; width: 75%; }
        .strength-strong { background: #3b82f6; width: 100%; }

        .auth-btn {
            background: linear-gradient(45deg, var(--secondary), var(--accent));
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px var(--shadow-light);
            margin-top: 1rem;
        }

        .auth-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px var(--shadow-heavy);
        }

        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .login-link a {
            color: var(--secondary);
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover { 
            text-decoration: underline; 
        }

        .error-message {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 0.25rem;
            display: none;
        }

        @media (max-width: 480px) {
            .auth-container {
                margin: 1rem;
                padding: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="top-nav">
        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Back to Home
        </a>
        <button id="theme-toggle" title="Toggle Theme">
            <i class="fas fa-moon"></i>
        </button>
    </div>

    <div class="auth-container">
        <div class="auth-header">
            <div class="logo">
                <i class="fas fa-satellite"></i> Aero<span>Detect</span>
            </div>
            <p>Create your account to start detecting</p>
        </div>

        <form id="register-form">
            <div class="input-group">
                <input type="text" id="fullName" placeholder="Full Name" required>
                <i class="fas fa-user"></i>
                <div class="error-message" id="nameError"></div>
            </div>

            <div class="input-group">
                <input type="email" id="email" placeholder="Email Address" required>
                <i class="fas fa-envelope"></i>
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="Create Password" required>
                <i class="fas fa-lock"></i>
                <div class="password-strength" id="passwordStrength"></div>
                <div class="error-message" id="passwordError"></div>
            </div>

            <div class="input-group">
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                <i class="fas fa-lock"></i>
                <div class="error-message" id="confirmError"></div>
            </div>

            <button type="submit" class="auth-btn" id="submitBtn">Create Account</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="login.html">Sign in here</a>
        </div>
    </div>

    <script>
        // Theme Logic
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;
        const savedTheme = localStorage.getItem('theme') || 'light';
        
        if (savedTheme === 'dark') {
            body.classList.add('dark-mode');
            themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
        }

        themeToggle.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            themeToggle.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        });

        // Background Particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 15 + 10) + 's';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.width = particle.style.height = (Math.random() * 6 + 2) + 'px';
                particle.style.opacity = Math.random() * 0.6 + 0.3;
                container.appendChild(particle);
            }
        }
        createParticles();

        // Password Strength Checker
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('passwordStrength');
        
        passwordInput.addEventListener('input', function() {
            const password = this.value;
            strengthBar.className = 'password-strength';
            
            if (password.length < 6) {
                strengthBar.classList.add('strength-weak');
            } else if (password.length < 8) {
                strengthBar.classList.add('strength-fair');
            } else if (password.length < 12) {
                strengthBar.classList.add('strength-good');
            } else {
                strengthBar.classList.add('strength-strong');
            }
        });

        // Form Validation
        function showError(elementId, message) {
            const errorElement = document.getElementById(elementId);
            errorElement.textContent = message;
            errorElement.style.display = 'block';
        }

        function clearError(elementId) {
            const errorElement = document.getElementById(elementId);
            errorElement.textContent = '';
            errorElement.style.display = 'none';
        }

        // Form Submission
        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');

            // Clear previous errors
            clearError('nameError');
            clearError('emailError');
            clearError('passwordError');
            clearError('confirmError');

            let isValid = true;

            // Name validation
            if (fullName.length < 2) {
                showError('nameError', 'Name must be at least 2 characters');
                isValid = false;
            }

            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('emailError', 'Please enter a valid email address');
                isValid = false;
            }

            // Password validation
            if (password.length < 6) {
                showError('passwordError', 'Password must be at least 6 characters');
                isValid = false;
            }

            // Confirm password validation
            if (password !== confirmPassword) {
                showError('confirmError', 'Passwords do not match');
                isValid = false;
            }

            if (isValid) {
                submitBtn.disabled = true;
                submitBtn.textContent = 'Creating Account...';
                
                // Simulate API call
                setTimeout(() => {
                    alert(`✅ Account created successfully for ${fullName}!\n\nWelcome to AeroDetect!`);
                    window.location.href = 'index.html';
                }, 1500);
            }
        });

        // Real-time validation
        document.getElementById('fullName').addEventListener('blur', function() {
            if (this.value.trim().length < 2) {
                showError('nameError', 'Name must be at least 2 characters');
            }
        });

        document.getElementById('email').addEventListener('blur', function() {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(this.value.trim())) {
                showError('emailError', 'Please enter a valid email address');
            }
        });

        document.getElementById('confirmPassword').addEventListener('blur', function() {
            const password = document.getElementById('password').value;
            if (this.value !== password) {
                showError('confirmError', 'Passwords do not match');
            }
        });
    </script>
</body>
</html>
